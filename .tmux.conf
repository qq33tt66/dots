# ============================================================================= TERMINAL
# =============================================================================
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc,alacritty:Tc,tmux-256color:Tc"
set -s escape-time 0
set -g focus-events on
set -g set-clipboard on

# =============================================================================
# GENERAL
# =============================================================================
set -g history-limit 100000
set -g display-time 3000
set -g status-interval 5
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g mouse on
setw -g aggressive-resize on

# =============================================================================
# PREFIX
# =============================================================================
set -g prefix M-b
unbind C-b
bind M-b send-prefix

# =============================================================================
# KEY BINDINGS
# =============================================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# windows
bind c new-window -c "#{pane_current_path}"
bind Tab last-window
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1
bind X kill-window
bind S choose-tree -Zs

# panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind x kill-pane

# window jump (no prefix)
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# scripts
bind g run "~/.local/dots/scripts/open-github.sh"
bind f run "tmux neww ~/.local/dots/scripts/tmux.sh"

# =============================================================================
# VI MODE
# =============================================================================
setw -g mode-keys vi
set -g status-keys emacs

# =============================================================================
# TOKYO NIGHT COLORS
# Tokyo Night palette:
#   bg:         #1a1b26
#   bg_dark:    #16161e
#   fg:         #c0caf5
#   comment:    #565f89
#   blue:       #7aa2f7
#   cyan:       #7dcfff
#   green:      #9ece6a
#   magenta:    #bb9af7
#   red:        #f7768e
#   yellow:     #e0af68
#   orange:     #ff9e64
# =============================================================================

# status bar
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#565f89"
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 40

# show a dim bullet, highlight it when prefix is active
set -g status-left  "#[fg=#565f89]#{?client_prefix,#[fg=#f7768e bold]◆,◇}  "
set -g status-right "#[fg=#565f89]#S"

# windows
setw -g window-status-format         "#[fg=#565f89,bg=default]  #W  "
setw -g window-status-current-format "#[fg=#7aa2f7,bold,bg=default]  #W  "
setw -g window-status-separator      ""
setw -g window-status-activity-style "fg=#e0af68,bold"
setw -g window-status-bell-style     "fg=#f7768e,bold"

# pane borders
set -g pane-border-style        "fg=#24283b"
set -g pane-active-border-style "fg=#7aa2f7"

# copy mode highlight
set -g mode-style "bg=#2d3f76,fg=#c0caf5"

# =============================================================================
# PLUGINS
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
